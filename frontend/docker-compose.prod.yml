# Full-stack production compose (e.g. single VPS or local prod smoke test).
# Coolify usually runs the app container + a managed Postgres service separately.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: visit_harar
    volumes:
      - visit_harar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d visit_harar"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_URL: ${VITE_APP_URL:?set VITE_APP_URL}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/visit_harar
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?set BETTER_AUTH_URL}
      APP_URL: ${APP_URL:?set APP_URL}
      UPLOAD_DIR: /data/uploads
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - visit_harar_uploads:/data/uploads

volumes:
  visit_harar_pg_data:
  visit_harar_uploads:
