services:
  postgres:
    image: postgres:16-alpine
    container_name: visit-harar-pg
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: visit_harar
    volumes:
      - visit_harar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d visit_harar']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  visit_harar_pg_data:
